{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ultimatix ATS - Super Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/app.css' %}?v=17">
  <link rel="stylesheet" href="{% static 'css/login.css' %}?v=108">
</head>
<body class="auth-body-custom auth-superadmin">
  <main class="login-wrapper min-vh-100 d-flex align-items-center justify-content-center">
    <div class="login-container">
      <div class="login-left">
        <h2 class="login-left-title">Platform<br>Administration</h2>
        <div class="login-left-img-wrap" style="margin-top: 10px;">
          <img src="{% static 'images/OBJECTS.png' %}" alt="Login Illustration" style="width: 100%; max-width: 360px; height: auto; border-radius: 16px; opacity: 0.95;">
        </div>
      </div>
      <div class="login-right">
        
        <form method="post" class="login-form superadmin-form">
          {% csrf_token %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags|default:'info' }} py-2">{{ message }}</div>
            {% endfor %}
          {% endif %}

          <div class="login-logo-container">
            <img src="{% static 'images/ultimatix_logo.jpg' %}" alt="Ultimatix Logo" class="login-brand-logo">
            <span class="login-brand-text">Ultimatix ATS</span>
          </div>

          <h1 class="login-heading">Super Admin Login</h1>

          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control custom-input" placeholder="Enter Username" autocomplete="username" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control custom-input" placeholder="Enter Password" autocomplete="current-password" required>
          </div>

          <button type="submit" class="btn btn-primary custom-login-btn w-100">Login</button>

          <div class="text-center mt-3 pt-3" style="border-top: 1px solid rgba(15, 23, 42, 0.08);">
            <div class="text-muted" style="font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;">Careers Page</div>
            <a href="{{ CAREERS_URL|default:'/careers/' }}" class="text-decoration-none" style="font-size: 13px; font-weight: 700;" target="_blank" rel="noopener">
              {{ CAREERS_URL|default:'/careers/' }}
            </a>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
