<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ subject }}</title>
  </head>
  <body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial,Helvetica,sans-serif;">
    <div style="max-width:680px;margin:0 auto;padding:24px;">
      <div style="background:#0f172a;border-radius:14px 14px 0 0;padding:22px 24px;color:#fff;">
        <div style="font-size:14px;opacity:.9;">{{ company_name }}</div>
        <div style="font-size:22px;font-weight:700;margin-top:6px;">Notification</div>
      </div>
      <div style="background:#fff;border-radius:0 0 14px 14px;padding:22px 24px;border:1px solid #e5e7eb;border-top:0;">
        <div style="font-size:16px;color:#111827;font-weight:700;margin-bottom:12px;">{{ subject }}</div>
        <div style="font-size:14px;color:#111827;line-height:1.6;">
          {{ body_html|safe }}
        </div>
        {% if action_url %}
        <div style="margin-top:18px;">
          <a href="{{ action_url }}" style="display:inline-block;background:#2563eb;color:#fff;text-decoration:none;padding:12px 16px;border-radius:10px;font-weight:700;">
            {{ action_label|default:"Open" }}
          </a>
        </div>
        {% endif %}
        <div style="margin-top:18px;border-top:1px solid #e5e7eb;padding-top:12px;color:#6b7280;font-size:12px;">
          This message was generated automatically by {{ company_name }}.
        </div>
      </div>
    </div>
  </body>
</html>
