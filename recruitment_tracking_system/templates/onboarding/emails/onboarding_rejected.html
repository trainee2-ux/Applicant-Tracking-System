<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Onboarding Documents Rejected</title>
  </head>
  <body style="font-family: Arial, sans-serif; background: #f8fafc; padding: 24px;">
    <div style="max-width: 680px; margin: 0 auto; background: white; border: 1px solid #e2e8f0; border-radius: 10px; overflow: hidden;">
      <div style="padding: 18px 20px; background: #0f172a; color: white;">
        <div style="font-size: 14px; opacity: 0.9;">{{ company_name }}</div>
        <div style="font-size: 18px; font-weight: 700; margin-top: 6px;">Onboarding Documents Rejected</div>
      </div>
      <div style="padding: 20px;">
        <p style="margin: 0 0 10px;">Dear {{ candidate.full_name }},</p>
        <p style="margin: 0 0 14px;">Your onboarding submission was rejected by HR.</p>

        <div style="padding: 12px 14px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px;">
          <div style="font-weight: 700; color: #991b1b; margin-bottom: 6px;">Reason</div>
          <div style="color: #7f1d1d; white-space: pre-wrap;">{{ reason }}</div>
        </div>

        <div style="margin-top: 16px;">
          <div style="font-size: 14px; font-weight: 700; color: #0f172a; margin-bottom: 10px;">Re-upload Documents</div>
          <a href="{{ upload_url }}" style="display: inline-block; background: #2563eb; color: white; text-decoration: none; padding: 10px 14px; border-radius: 8px; font-weight: 700;">Upload Again</a>
        </div>

        <div style="margin-top: 16px; font-size: 12px; color: #64748b;">
          If you haven't registered yet, use:
          <a href="{{ register_url }}" style="color: #2563eb;">{{ register_url }}</a>
        </div>
      </div>
    </div>
  </body>
</html>
